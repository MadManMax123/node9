<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NODE 9 — NULL CORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="node9">

  <!-- Background audio -->
  <audio id="bg-audio" src="/audio/finale.mp3" autoplay loop></audio>

  <!-- LOG SCREEN -->
  <div id="log-screen" class="log-screen">
    <div class="crt-overlay"></div>
    <div id="log-container" class="log-container"></div>
  </div>

  <!-- SHUTTER -->
  <div id="shutter" class="shutter hidden">
    <div class="shutter-left"></div>
    <div class="shutter-right"></div>
  </div>

  <!-- LORE SCREEN -->
  <div id="lore-screen" class="lore-screen hidden">
    <div class="crt-overlay"></div>
    <div id="lore-text" class="lore-text"></div>
  </div>

  <!-- FINAL REVEAL -->
  <div id="final-screen" class="final-screen hidden">
    <div class="crt-overlay"></div>

    <div class="flag-grid" id="flag-grid">
      <div class="flag-seg" data-flag-index="0"></div>
      <div class="flag-seg" data-flag-index="1"></div>
      <div class="flag-seg" data-flag-index="2"></div>
      <div class="flag-seg" data-flag-index="3"></div>
      <div class="flag-seg" data-flag-index="4"></div>
      <div class="flag-seg" data-flag-index="5"></div>
      <div class="flag-seg" data-flag-index="6"></div>
      <div class="flag-seg" data-flag-index="7"></div>
    </div>

    <div class="flash" id="flash-overlay"></div>

    <h1 class="restored-heading">NULL CODE RESTORED</h1>

    <p class="complete-note">
      Challenge Complete.<br/>
      The distributed fragments have been reconstructed.<br/>
      You have restored the signal.
    </p>

    <div id="post-credit" class="post-credit hidden">
      NULL: noise was never the enemy. it was the message.
    </div>

    <div id="post-footnote" class="post-footnote hidden">
      did u miss something?
    </div>
  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const collectedFlags = [
    "FLAG{LEVEL1_YOUR_FLAG}",
    "FLAG{LEVEL2_YOUR_FLAG}",
    "FLAG{LEVEL3_YOUR_FLAG}",
    "FLAG{LEVEL4_YOUR_FLAG}",
    "FLAG{LEVEL5_YOUR_FLAG}",
    "FLAG{LEVEL6_YOUR_FLAG}",
    "FLAG{LEVEL7_YOUR_FLAG}",
    "FLAG{LEVEL8_YOUR_FLAG}"
  ];

  const level9Flag = "FLAG{LEVEL9_YOUR_FLAG}";

  setTimeout(() => {

console.warn(
"%cSTOP!\n\nThis console is part of the NULL recovery interface.\nManual intervention may corrupt memory shards.\n\ntrace fragment: " + level9Flag,
"color:red; font-size:14px; font-family:monospace;"
);

}, 2500);

  const logs = [
    "NODE CORE ACCESSED",
    "VERIFYING FRAGMENT INTEGRITY...",
    "ENTROPY HASH MATCHED",
    "PRIME PRODUCT CONFIRMED",
    "BYTECODE TRACE VALID",
    "AUDIO NODE REASSEMBLED",
    "REDSTONE CRYPTO VERIFIED",
    "METADATA ARCHIVE RESTORED",
    "SPECTRAL SIGNATURE MATCHED",
    "MERGING DISTRIBUTED INSTANCES..."
  ];

  const hiddenFlagIndex = Math.floor(Math.random() * (logs.length - 3)) + 2;

  const preNoise = [
    "allocating node buffers...",
    "syncing distributed state...",
    "relinking archive sectors...",
    "verifying spectral map...",
    "entropy recalibration...",
    "mounting null partitions...",
    "checking stale mirrors...",
    "repairing shard index...",
    "link handshake unstable...",
    "tracing orphan bytecode...",
    "restoring parity blocks...",
    "replaying crash journal...",
    "rebuilding damaged lookup tables...",
    "walking fragmented memory graph...",
    "decompressing cold archive segment...",
    "revalidating distributed namespace...",
    "repair candidate accepted...",
    "reconstructing entropy lattice...",
    "merging silent fallback replicas...",
    "discarding poisoned state branch..."
  ];

  const followupNoise = [
    "shard table stabilized",
    "archive path recovered",
    "entropy gradient nominal",
    "checksum variance within tolerance",
    "distributed mirror online",
    "spectral drift resolved",
    "orphaned instance attached",
    "stale branch pruned",
    "signal fidelity rising",
    "node cluster synchronized",
    "fragment quorum reached",
    "cold storage unlocked",
    "repair sequence continuing",
    "fallback route established",
    "decryption lattice aligned"
  ];

  const errorNoise = [
    "corrupted shard encountered",
    "entropy drift detected",
    "invalid parity block",
    "mirror desync detected",
    "signal instability detected",
    "checksum mismatch",
    "fragment reconstruction failed"
  ];

  const warningNoise = [
    "retrying damaged sector",
    "fallback node engaged",
    "repair routine invoked",
    "stale mirror detected",
    "fragment latency above threshold"
  ];

  const flagVariants = [
    () => `residual echo persisted -> ${level9Flag}`,
    () => `mirror artifact detected : ${level9Flag}`,
    () => `orphan metadata recovered ${level9Flag}`,
    () => `trace fragment survived ${level9Flag}`
  ];

  const overwriteVariants = [
    "mirror artifact cleared",
    "residual echo discarded",
    "orphan metadata pruned",
    "trace fragment invalidated",
    "fallback mirror resynced",
    "silent branch collapsed"
  ];

  const logContainer = document.getElementById("log-container");
  const shutter = document.getElementById("shutter");
  const logScreen = document.getElementById("log-screen");
  const loreScreen = document.getElementById("lore-screen");
  const loreText = document.getElementById("lore-text");
  const finalScreen = document.getElementById("final-screen");
  const flagGrid = document.getElementById("flag-grid");
  const flashOverlay = document.getElementById("flash-overlay");
  const postCredit = document.getElementById("post-credit");
  const postFootnote = document.getElementById("post-footnote");
  const bgAudio = document.getElementById("bg-audio");

  if (bgAudio) {
    bgAudio.play().catch(() => {
      document.addEventListener("click", function resumeAudio() {
        bgAudio.play().catch(() => {});
        document.removeEventListener("click", resumeAudio);
      });
    });
  }

  let logIndex = 0;
  let hiddenFlagInjected = false;

  function timestamp() {
    const d = new Date();
    return `[${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}:${String(d.getSeconds()).padStart(2, "0")}]`;
  }

  function randomModule() {
    const modules = [
      "core", "entropy", "bytecode", "crypto", "spectral",
      "audio", "archive", "node", "bridge", "recovery", "sys",
      "mirror", "quorum", "fs", "trace"
    ];
    return modules[Math.floor(Math.random() * modules.length)];
  }

  function randomHex() {
    return "0x" + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, "0");
  }

  function scrollLogsToBottom() {
    logContainer.scrollTop = logContainer.scrollHeight;
  }

  function createLogLine(text = "", className = "") {
    const line = document.createElement("div");
    line.className = "log-line" + (className ? ` ${className}` : "");
    line.textContent = text;
    logContainer.appendChild(line);
    scrollLogsToBottom();
    return line;
  }

  function createNoiseLine() {
    const text = `${timestamp()} [${randomModule()}] ${randomHex()} :: ${preNoise[Math.floor(Math.random() * preNoise.length)]}`;
    const cls = Math.random() > 0.72 ? "dim-line" : "";
    createLogLine(text, cls);
  }

  function createStatusLine() {
    const text = `${timestamp()} [status] ${randomHex()} :: ${followupNoise[Math.floor(Math.random() * followupNoise.length)]}`;
    const cls = Math.random() > 0.55 ? "status-line" : "dim-line";
    createLogLine(text, cls);
  }

  function createWarningLine() {
    const text = `${timestamp()} [warn] ${randomHex()} :: ${warningNoise[Math.floor(Math.random() * warningNoise.length)]}`;
    createLogLine(text, "warn-line");
  }

  function createErrorLine() {
    const text = `${timestamp()} [error] ${randomHex()} :: ${errorNoise[Math.floor(Math.random() * errorNoise.length)]}`;
    createLogLine(text, "error-line");
  }

  function createDivider() {
    createLogLine("----------------------------------------------------------------", "divider-line");
  }

  function createChecksumLine() {
    const current = Math.floor(Math.random() * 9000 + 1000);
    const total = Math.floor(Math.random() * 3000 + 9000);
    createLogLine(
      `${timestamp()} [hash] ${randomHex()} :: block checksum ${current}/${total} accepted`,
      "dim-line"
    );
  }

  function createRetryLine() {
    const attempts = Math.floor(Math.random() * 3) + 1;
    createLogLine(
      `${timestamp()} [repair] ${randomHex()} :: transient fault encountered, retry ${attempts}/3`,
      "warn-line"
    );
  }

  function createProgressBar(label = "scan") {
    return new Promise((resolve) => {
      const total = 30;
      let filled = 0;
      const line = createLogLine();

      const interval = setInterval(() => {
        filled += Math.floor(Math.random() * 3) + 1;
        if (filled > total) filled = total;

        const bar = "[" + "█".repeat(filled) + " ".repeat(total - filled) + "]";
        const percent = Math.floor((filled / total) * 100);

        line.textContent = `${timestamp()} [${label}] ${bar} ${String(percent).padStart(3, " ")}%`;
        scrollLogsToBottom();

        if (filled >= total) {
          clearInterval(interval);
          setTimeout(resolve, 120 + Math.random() * 220);
        }
      }, 35 + Math.random() * 55);
    });
  }

  function corruptChar(char) {
    const pool = "!@#$%^&*()_+-=[]{};:<>?/\\|~";
    if (char === " ") return " ";
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function typeLine(text) {
    return new Promise((resolve) => {
      const prefix = `${timestamp()} [${randomModule()}] ${randomHex()} :: `;
      const line = createLogLine(prefix);
      let i = 0;

      const interval = setInterval(() => {
        const revealed = text.slice(0, i);
        const next = text[i] || "";
        const useCorruption = Math.random() > 0.72 && next && next !== " ";
        const shownChar = useCorruption ? corruptChar(next) : next;

        line.textContent = prefix + revealed + shownChar;
        scrollLogsToBottom();

        if (useCorruption) {
          setTimeout(() => {
            line.textContent = prefix + text.slice(0, i + 1);
            scrollLogsToBottom();
          }, 22 + Math.random() * 45);
        }

        i++;

        if (i >= text.length) {
          clearInterval(interval);
          line.textContent = prefix + text;
          scrollLogsToBottom();

          if (Math.random() > 0.6) {
            line.classList.add("success-line");
          }

          setTimeout(resolve, 260 + Math.random() * 500);
        }
      }, 16 + Math.random() * 34);
    });
  }

  function injectBriefHiddenFlag() {
    return new Promise((resolve) => {
      const variant = flagVariants[Math.floor(Math.random() * flagVariants.length)]();
      const overwrite = overwriteVariants[Math.floor(Math.random() * overwriteVariants.length)];
      const line = createLogLine(
        `${timestamp()} [mirror] ${randomHex()} :: ${variant}`,
        "subtle-flag-line"
      );

      setTimeout(() => {
        line.className = "log-line dim-line";
        line.textContent = `${timestamp()} [mirror] ${randomHex()} :: ${overwrite}`;
        scrollLogsToBottom();
        resolve();
      }, 700);
    });
  }

  async function nextLog() {
    if (logIndex >= logs.length) {
      if (Math.random() > 0.25) createNoiseLine();
      if (Math.random() > 0.45) createStatusLine();
      if (Math.random() > 0.35) createChecksumLine();
      if (Math.random() > 0.7) createWarningLine();
      if (Math.random() > 0.86) createErrorLine();
      if (Math.random() > 0.45) createDivider();

      setTimeout(triggerShutter, 1800);
      return;
    }

    const noiseCount = Math.floor(Math.random() * 3) + 1;
    for (let i = 0; i < noiseCount; i++) {
      createNoiseLine();
      if (Math.random() > 0.55) createStatusLine();
      if (Math.random() > 0.64) createWarningLine();
      if (Math.random() > 0.74) createChecksumLine();
      if (Math.random() > 0.86) createRetryLine();
      if (Math.random() > 0.9) createErrorLine();
      if (Math.random() > 0.87) createDivider();
    }

    if (!hiddenFlagInjected && logIndex === hiddenFlagIndex) {
      hiddenFlagInjected = true;
      await injectBriefHiddenFlag();
    }

    await typeLine(logs[logIndex]);

    const extraAfterMain = Math.floor(Math.random() * 3) + 1;
    for (let i = 0; i < extraAfterMain; i++) {
      if (Math.random() > 0.22) createStatusLine();
      if (Math.random() > 0.48) createWarningLine();
      if (Math.random() > 0.58) createChecksumLine();
      if (Math.random() > 0.76) createNoiseLine();
      if (Math.random() > 0.88) createErrorLine();
    }

    if (Math.random() > 0.2) {
      await createProgressBar(["scan", "merge", "verify", "restore", "relink"][Math.floor(Math.random() * 5)]);
    }

    logIndex++;
    nextLog();
  }

  function triggerShutter() {
    shutter.classList.remove("hidden");
    shutter.classList.add("active");

    setTimeout(() => {
      logScreen.classList.add("hidden");
      shutter.classList.remove("active");
      showLore();
    }, 1800);
  }

  const loreSentences = [
    "NULL was never just a system.",
    "It was an experimental distributed intelligence.",
    "Designed to preserve knowledge across unstable networks.",
    "When a hostile actor corrupted its core files,",
    "NULL scattered itself into fragmented nodes to survive.",
    "Each node carried a shard of its memory.",
    "Each challenge you solved restored part of its structure.",
    "Each flag you claimed reconnected a broken pathway.",
    "You were not just solving puzzles.",
    "You were rebuilding NULL from the outside."
  ];

  let loreIndex = 0;

  function typeLore(sentence) {
    return new Promise((resolve) => {
      loreText.textContent = "";
      let i = 0;

      const interval = setInterval(() => {
        const revealed = sentence.slice(0, i);
        const next = sentence[i] || "";
        const useCorruption = Math.random() > 0.84 && next && next !== " ";
        loreText.textContent = revealed + (useCorruption ? corruptChar(next) : next);
        i++;

        if (i >= sentence.length) {
          clearInterval(interval);
          loreText.textContent = sentence;

          setTimeout(() => {
            loreText.classList.add("lore-fade");
            setTimeout(() => {
              loreText.textContent = "";
              loreText.classList.remove("lore-fade");
              resolve();
            }, 500);
          }, 1800);
        }
      }, 28 + Math.random() * 22);
    });
  }

  async function showLore() {
    loreScreen.classList.remove("hidden");

    while (loreIndex < loreSentences.length) {
      await typeLore(loreSentences[loreIndex]);
      loreIndex++;
    }

    setTimeout(showFinal, 900);
  }

  function populateFlags() {
    const segs = flagGrid.querySelectorAll(".flag-seg");
    segs.forEach((seg, idx) => {
      seg.textContent = idx < collectedFlags.length ? collectedFlags[idx] : "—";
    });
  }

  function triggerFlash() {
    flashOverlay.classList.remove("flash-active");
    void flashOverlay.offsetWidth;
    flashOverlay.classList.add("flash-active");
  }

  function showPostCredit() {
    postCredit.classList.remove("hidden");
    requestAnimationFrame(() => {
      postCredit.classList.add("post-credit-visible");
    });

    setTimeout(() => {
      postFootnote.classList.remove("hidden");
      requestAnimationFrame(() => {
        postFootnote.classList.add("post-footnote-visible");
      });
    }, 1200);
  }

  function showFinal() {
    loreScreen.classList.add("hidden");
    populateFlags();
    finalScreen.classList.remove("hidden");
    triggerFlash();
    setTimeout(showPostCredit, 3500);
  }

  nextLog();
});
</script>

</body>
</html>
